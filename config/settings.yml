plugins:
  dumbcourse_enabled:
    default: true
    client: true
  dumbcourse_default_theme:
    default: "dark"
    client: true
    type: enum
    choices:
      - dark
      - light
  dumbcourse_default_view:
    default: "latest"
    client: true
    type: enum
    choices:
      - latest
      - new
      - top
      - unseen
      - hot
      - my
      - categories
  dumbcourse_base_path:
    default: "dumb"
    client: true
  dumbcourse_sidebar_link_enabled:
    default: true
    client: true
  dumbcourse_show_category_names:
    default: true
    client: true
  dumbcourse_topic_posters_visibility:
    default: "all"
    client: true
    type: enum
    choices:
      - all
      - desktop
      - mobile
      - none
  dumbcourse_online_glow_enabled:
    default: true
    client: true
  dumbcourse_push_enabled:
    default: true
    client: false
  dumbcourse_pagination_enabled:
    default: false
    client: true
  dumbcourse_topics_per_page:
    default: 30
    min: 10
    max: 100
    client: true
  dumbcourse_languagetool_enabled:
    default: false
    client: false
  dumbcourse_languagetool_mode:
    default: "self_hosted"
    client: false
    type: enum
    choices:
      - self_hosted
      - official_api
  dumbcourse_languagetool_url:
    default: ""
    client: false
  dumbcourse_languagetool_secret:
    default: ""
    client: false
  dumbcourse_languagetool_api_url:
    default: "https://api.languagetool.org/v2/check"
    client: false
  dumbcourse_languagetool_api_username:
    default: ""
    client: false
  dumbcourse_languagetool_api_key:
    default: ""
    client: false
